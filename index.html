<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0A0B2E">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="/manifest.json">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><rect fill='%238B3DD9' width='24' height='24' rx='4'/><text x='12' y='18' font-size='14' font-weight='bold' text-anchor='middle' fill='%234BF2F2'>D</text></svg>">
<title>Duo Energy — Sofía × Ángel</title>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>

<!-- React + Babel -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js"></script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">

<style>
/* ===== RESET & BASE ===== */
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:#0A0B2E;color:#F0F2FF;font-family:'Space Grotesk',system-ui,sans-serif;-webkit-font-smoothing:antialiased;overscroll-behavior:none}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,select{font-family:inherit}

/* ===== CSS VARS ===== */
:root{
  --purple:#8B3DD9;
  --cyan:#4BF2F2;
  --indigo:#3A37A6;
  --deep:#141759;
  --navy:#0F1135;
  --bg:#0A0B2E;
  --surface:rgba(58,55,166,0.18);
  --surface2:rgba(22,62,115,0.30);
  --border:rgba(75,242,242,0.15);
  --border2:rgba(75,242,242,0.32);
  --text:#F0F2FF;
  --dim:rgba(240,242,255,0.65);
  --faint:rgba(240,242,255,0.38);
  --mono:'JetBrains Mono',monospace;
  --r:12px;--rl:20px;
}
[data-theme=light]{
  --bg:#F4F5FC;
  --navy:#E8EAF6;
  --deep:#FFFFFF;
  --surface:rgba(255,255,255,0.92);
  --surface2:rgba(232,234,246,0.80);
  --border:rgba(58,55,166,0.14);
  --border2:rgba(58,55,166,0.38);
  --text:#141759;
  --dim:rgba(20,23,89,0.70);
  --faint:rgba(20,23,89,0.42);
  --cyan:#6C2BD9;
  --purple:#3A37A6;
  --indigo:#5048C8;
}

/* ===== BACKGROUND ===== */
body{
  background:
    radial-gradient(ellipse 80% 60% at 0% 0%,rgba(139,61,217,0.22),transparent 55%),
    radial-gradient(ellipse 60% 50% at 100% 100%,rgba(75,242,242,0.12),transparent 55%),
    radial-gradient(ellipse 50% 40% at 50% 110%,rgba(58,55,166,0.28),transparent 65%),
    var(--bg);
  background-attachment:fixed;
}
[data-theme=light] body{
  background:
    radial-gradient(ellipse 80% 60% at 0% 0%,rgba(108,43,217,0.08),transparent 55%),
    radial-gradient(ellipse 60% 50% at 100% 100%,rgba(58,55,166,0.07),transparent 55%),
    var(--bg);
  background-attachment:fixed;
}
[data-theme=light] html,
[data-theme=light] body{
  color:var(--text);
}

/* ===== LAYOUT ===== */
.app{max-width:1400px;margin:0 auto;padding:24px 24px 120px}
@media(max-width:640px){.app{padding:12px 10px 100px}}

/* ===== MOBILE COMPACT ===== */
@media(max-width:640px){
  .header{margin-bottom:14px;gap:8px}
  .brand-mark{width:38px;height:38px;border-radius:10px}
  .brand-name{font-size:15px}
  .brand-sub{display:none}
  .sync-badge span.sync-label{display:none}
  .icon-btn{width:36px;height:36px;font-size:14px}
  .athlete-switch{padding:3px;gap:3px;margin-bottom:14px}
  .athlete-tab{padding:10px 8px;font-size:12px;gap:6px;border-radius:12px}
  .avatar{width:20px;height:20px;font-size:10px}
  .section-tabs{gap:5px;margin-bottom:14px}
  .tab{padding:8px 12px;font-size:12px}
  .streak{padding:10px 14px;margin-bottom:14px;gap:10px}
  .streak-text{font-size:12px}
  .streak-num{font-size:18px}
  .days-strip{gap:3px;margin-bottom:12px}
  .day-pill{padding:8px 2px;gap:3px;border-radius:10px}
  .day-icon{font-size:14px}
  .day-num{font-size:9px;letter-spacing:0}
  .day-header{padding:14px 14px 10px;gap:8px}
  .day-title{font-size:18px;gap:7px}
  .day-tag{font-size:9px}
  .stat-chip{font-size:10px;padding:4px 8px}
  .exercise-list{padding:4px}
  .ex{padding:11px 8px;gap:7px;grid-template-columns:30px 1fr auto}
  .ex-check{width:30px;height:30px;border-radius:8px;font-size:12px}
  .ex-name{font-size:13px;margin-bottom:4px}
  .ex-meta{gap:5px}
  .ex-meta span{font-size:10px}
  .ex-btn{width:28px;height:28px;font-size:11px}
  .w-qbump{width:20px;height:20px;font-size:11px}
  .w-pill{font-size:10px;padding:2px 7px}
  .macro-overview{padding:16px;gap:14px;flex-direction:column;align-items:center}
  .macro-stats{width:100%}
  .macro-ring{width:120px;height:120px}
  .quartil{padding:12px 14px}
  .quartil-cal{font-size:13px}
  .food-name{font-size:12px}
  .food-qty{font-size:10px}
  .food-macros{font-size:10px;gap:5px}
  .supp-grid{grid-template-columns:1fr 1fr;gap:8px}
  .supp-card{padding:14px 12px}
  .supp-icon{font-size:22px}
  .supp-name{font-size:13px}
  .prog-head{padding:16px 16px 12px}
  .prog-title{font-size:20px}
  .stat-grid{padding:0 14px 16px;gap:8px;grid-template-columns:1fr 1fr}
  .stat-val{font-size:22px}
  .prog-section{padding:0 14px 16px}
  .hm-cell{border-radius:5px}
  .hm-cell span{font-size:8px}
  .pr-name{font-size:12px}
  .timer-fab{right:12px;bottom:16px}
  .timer-bubble{width:46px;height:46px;font-size:15px}
  .modal{padding:20px 18px 18px;border-radius:16px}
  .modal h2{font-size:17px}
  .modal p{font-size:12px}
  .modal-step{font-size:11px}
  .goal-banner{padding:10px 14px!important;font-size:11px}
  .goal-banner .gb-text strong{font-size:12px}
  .compare{grid-template-columns:1fr}
}

/* ===== HEADER ===== */
.header{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:24px;flex-wrap:wrap}
.brand{display:flex;align-items:center;gap:13px}
.brand-mark{width:46px;height:46px;border-radius:13px;background:linear-gradient(135deg,var(--purple),var(--cyan));display:grid;place-items:center;box-shadow:0 8px 30px rgba(139,61,217,0.35),inset 0 1px 0 rgba(255,255,255,0.2);position:relative;overflow:hidden;flex-shrink:0}
.brand-mark::after{content:"";position:absolute;inset:1px;border-radius:12px;background:linear-gradient(135deg,rgba(255,255,255,0.18),transparent 55%)}
.brand-mark svg{position:relative;z-index:1}
.brand-name{font-size:17px;font-weight:700;letter-spacing:-0.01em;background:linear-gradient(90deg,var(--cyan),var(--purple));-webkit-background-clip:text;background-clip:text;color:transparent;line-height:1.1}
.brand-sub{font-size:10px;color:var(--faint);letter-spacing:0.18em;text-transform:uppercase;margin-top:1px}
.header-actions{display:flex;gap:8px;align-items:center}
.icon-btn{width:40px;height:40px;border-radius:11px;background:var(--surface);border:1px solid var(--border);display:grid;place-items:center;transition:all 0.2s;backdrop-filter:blur(12px);font-size:16px}
.icon-btn:hover{border-color:var(--border2);transform:translateY(-1px)}
.icon-btn:active{transform:scale(0.95)}

/* ===== SYNC STATUS ===== */
.sync-badge{display:flex;align-items:center;gap:6px;padding:6px 12px;border-radius:20px;font-size:11px;font-weight:600;letter-spacing:0.06em;text-transform:uppercase;border:1px solid var(--border);background:var(--surface);backdrop-filter:blur(12px);transition:all 0.3s;white-space:nowrap}
.sync-dot{width:7px;height:7px;border-radius:50%;transition:background 0.3s}
.sync-badge.online .sync-dot{background:#4BF2F2;box-shadow:0 0 6px rgba(75,242,242,0.8)}
.sync-badge.offline .sync-dot{background:#ff8b8b}
.sync-badge.syncing .sync-dot{background:#FFD700;animation:pulse 1s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}

/* ===== FIREBASE CONFIG MODAL ===== */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);backdrop-filter:blur(8px);display:grid;place-items:center;z-index:1000;padding:16px}
.modal{background:var(--deep);border:1px solid var(--border2);border-radius:var(--rl);padding:28px 28px 24px;max-width:480px;width:100%;box-shadow:0 30px 80px rgba(0,0,0,0.6),0 0 0 1px rgba(75,242,242,0.1)}
.modal h2{font-size:20px;font-weight:700;margin-bottom:6px;background:linear-gradient(90deg,var(--cyan),var(--purple));-webkit-background-clip:text;background-clip:text;color:transparent}
.modal p{font-size:13px;color:var(--dim);line-height:1.6;margin-bottom:20px}
.modal-steps{display:flex;flex-direction:column;gap:6px;margin-bottom:20px}
.modal-step{display:flex;gap:10px;align-items:flex-start;font-size:12px;color:var(--dim);line-height:1.5}
.step-num{width:20px;height:20px;border-radius:50%;background:var(--purple);color:#fff;font-size:10px;font-weight:700;display:grid;place-items:center;flex-shrink:0;margin-top:1px}
.step-num a{color:var(--cyan);font-size:11px}
.modal-field{display:flex;flex-direction:column;gap:6px;margin-bottom:14px}
.modal-field label{font-size:11px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:var(--dim)}
.modal-field input{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:10px 14px;color:var(--text);font-size:13px;outline:none;transition:border-color 0.2s;font-family:var(--mono)}
.modal-field input:focus{border-color:var(--border2)}
.modal-field input::placeholder{color:var(--faint)}
.modal-actions{display:flex;gap:10px;flex-wrap:wrap}
.btn-primary{flex:1;padding:12px;border-radius:var(--r);background:linear-gradient(135deg,var(--purple),var(--indigo));color:#fff;font-weight:700;font-size:14px;transition:all 0.2s;border:none}
.btn-primary:hover{filter:brightness(1.1);transform:translateY(-1px)}
.btn-primary:active{transform:scale(0.98)}
.btn-secondary{padding:12px 20px;border-radius:var(--r);background:var(--surface);border:1px solid var(--border);color:var(--dim);font-size:14px;font-weight:600;transition:all 0.2s}
.btn-secondary:hover{border-color:var(--border2);color:var(--text)}
.modal-note{font-size:11px;color:var(--faint);margin-top:14px;padding:10px 12px;background:rgba(75,242,242,0.06);border:1px solid rgba(75,242,242,0.12);border-radius:var(--r);line-height:1.6}
.modal-note strong{color:var(--cyan);font-weight:600}
.modal-content{background:var(--deep);border:1px solid var(--border2);border-radius:var(--rl);padding:28px;max-width:400px;width:100%;box-shadow:0 30px 80px rgba(0,0,0,0.6)}
.modal-content h3{font-size:18px;font-weight:700;margin-bottom:20px;color:var(--text)}
.modal-btn{display:block;width:100%;padding:12px;border-radius:var(--r);background:linear-gradient(135deg,var(--purple),var(--indigo));color:#fff;font-weight:700;font-size:14px;border:none;cursor:pointer;margin-bottom:10px;transition:all 0.2s}
.modal-btn:hover{filter:brightness(1.1);transform:translateY(-2px)}
.modal-btn-cancel{display:block;width:100%;padding:12px;border-radius:var(--r);background:var(--surface);border:1px solid var(--border);color:var(--dim);font-weight:600;font-size:14px;cursor:pointer;transition:all 0.2s}
.modal-btn-cancel:hover{border-color:var(--border2);color:var(--text)}

/* ===== SPLASH SCREEN ===== */
.splash-screen{position:fixed;inset:0;background:linear-gradient(135deg,#0A0B2E 0%,#1a1b4d 100%);display:grid;place-items:center;z-index:2000;animation:splash-fade-out 0.6s ease-out 1.4s forwards}
@keyframes splash-fade-out{0%{opacity:1;transform:scale(1)}100%{opacity:0;transform:scale(0.95);pointer-events:none}}
.splash-content{text-align:center;display:flex;flex-direction:column;align-items:center;gap:16px;animation:splash-pop 0.8s cubic-bezier(0.68,-0.55,0.265,1.55)}
@keyframes splash-pop{0%{transform:scale(0.8);opacity:0}50%{transform:scale(1.05)}100%{transform:scale(1);opacity:1}}
.splash-logo{width:120px;height:120px;background:linear-gradient(135deg,#8B3DD9,#4BF2F2);border-radius:30px;display:grid;place-items:center;font-size:56px;font-weight:900;color:#fff;box-shadow:0 30px 60px rgba(139,61,217,0.4),inset 0 1px 0 rgba(255,255,255,0.2);animation:splash-bounce 1s cubic-bezier(0.68,-0.55,0.265,1.55)}
@keyframes splash-bounce{0%{transform:translateY(-20px);opacity:0}50%{transform:translateY(10px)}100%{transform:translateY(0);opacity:1}}
.splash-title{font-size:36px;font-weight:900;color:#4BF2F2;margin:0;letter-spacing:-0.02em;text-shadow:0 4px 12px rgba(75,242,242,0.3)}
.splash-subtitle{font-size:14px;color:rgba(255,255,255,0.6);letter-spacing:0.15em;text-transform:uppercase;font-weight:600}
.splash-loader{width:40px;height:4px;background:rgba(255,255,255,0.2);border-radius:2px;margin-top:20px;position:relative;overflow:hidden}
.splash-loader::after{content:'';position:absolute;left:0;top:0;height:100%;width:30%;background:linear-gradient(90deg,#4BF2F2,#8B3DD9);border-radius:2px;animation:splash-load 1s ease-in-out infinite}
@keyframes splash-load{0%{left:0}50%{left:70%}100%{left:0}}

/* ===== ATHLETE SWITCHER ===== */
.athlete-switch{display:flex;background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:5px;gap:4px;backdrop-filter:blur(12px);margin-bottom:22px}
.athlete-tab{flex:1;padding:13px 16px;border-radius:14px;display:flex;align-items:center;justify-content:center;gap:9px;font-weight:600;font-size:14px;color:var(--dim);transition:all 0.25s cubic-bezier(0.4,0,0.2,1);position:relative}
.athlete-tab.active{color:#fff;background:linear-gradient(135deg,var(--a-color,var(--purple)),var(--a-accent,var(--cyan)));box-shadow:0 8px 28px rgba(0,0,0,0.3),inset 0 1px 0 rgba(255,255,255,0.2)}
.athlete-tab.active.both{background:linear-gradient(135deg,var(--purple),var(--indigo),var(--cyan))}
.avatar{width:25px;height:25px;border-radius:50%;display:grid;place-items:center;background:rgba(255,255,255,0.15);font-size:12px;font-weight:700;object-fit:cover}

/* ===== SECTION TABS ===== */
.section-tabs{display:flex;gap:8px;margin-bottom:22px;overflow-x:auto;scrollbar-width:none;padding-bottom:2px}
.section-tabs::-webkit-scrollbar{display:none}
.tab{display:flex;align-items:center;gap:6px;padding:10px 18px;border-radius:22px;font-size:13px;font-weight:600;color:var(--dim);background:var(--surface);border:1px solid var(--border);white-space:nowrap;transition:all 0.2s;backdrop-filter:blur(8px)}
.tab.active{color:var(--cyan);border-color:rgba(75,242,242,0.5);background:rgba(75,242,242,0.08)}
[data-theme=light] .tab.active{color:var(--purple);border-color:rgba(139,61,217,0.4);background:rgba(139,61,217,0.07)}
.tab:hover:not(.active){border-color:var(--border2);color:var(--text)}

/* ===== STREAK BANNER ===== */
.streak{display:flex;align-items:center;gap:14px;padding:14px 20px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);margin-bottom:20px;backdrop-filter:blur(8px)}
.streak-fire{font-size:20px}
.streak-text{font-size:14px;color:var(--dim);flex:1}
.streak-text strong{color:var(--text)}
.streak-num{font-family:var(--mono);font-size:22px;font-weight:700;color:var(--cyan)}
[data-theme=light] .streak-num{color:var(--purple)}

/* ===== CARDS ===== */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);backdrop-filter:blur(12px);overflow:hidden}

/* ===== DAY STRIP ===== */
.days-strip{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin-bottom:18px}
@media(max-width:480px){.days-strip{gap:4px}}
.day-pill{display:flex;flex-direction:column;align-items:center;gap:4px;padding:10px 4px;border-radius:var(--r);background:var(--surface);border:1px solid var(--border);transition:all 0.2s;backdrop-filter:blur(8px)}
.day-pill.active{background:linear-gradient(135deg,rgba(139,61,217,0.35),rgba(58,55,166,0.35));border-color:rgba(75,242,242,0.4)}
.day-pill.done{border-color:rgba(75,242,242,0.3)}
.day-pill.done .day-num{color:var(--cyan)}
.day-pill:hover:not(.active){border-color:var(--border2)}
.day-icon{font-size:16px}
.day-num{font-family:var(--mono);font-size:10px;font-weight:700;letter-spacing:0.06em;color:var(--faint)}
@media(max-width:360px){.day-icon{font-size:14px}.day-num{font-size:9px}}

/* ===== DAY CARD ===== */
.day-header{display:flex;justify-content:space-between;align-items:flex-start;gap:14px;padding:20px 20px 14px;flex-wrap:wrap;border-bottom:1px solid var(--border)}
.day-tag{font-size:10px;letter-spacing:0.18em;text-transform:uppercase;color:var(--faint);font-weight:600;margin-bottom:6px}
.day-title{font-size:22px;font-weight:700;letter-spacing:-0.02em;display:flex;align-items:center;gap:10px}
.day-stats{display:flex;gap:8px;flex-wrap:wrap}
.stat-chip{padding:5px 10px;background:var(--surface2);border:1px solid var(--border);border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap}

/* ===== EXERCISES ===== */
.exercise-list{display:flex;flex-direction:column;gap:2px;padding:8px}
.ex{display:grid;grid-template-columns:36px 1fr auto;align-items:center;gap:10px;padding:14px 12px;border-radius:var(--r);border:1px solid transparent;transition:all 0.2s;position:relative}
.ex:hover{background:var(--surface2);border-color:var(--border)}
.ex.done{opacity:0.55}
.ex.done .ex-name{text-decoration:line-through;color:var(--faint)}
.ex-check{width:34px;height:34px;border-radius:9px;border:1.5px solid var(--border2);display:grid;place-items:center;color:transparent;transition:all 0.2s;flex-shrink:0;font-size:14px;font-weight:700}
.ex-check.checked{background:linear-gradient(135deg,var(--purple),var(--cyan));border-color:transparent;color:#fff;box-shadow:0 4px 12px rgba(75,242,242,0.25)}
.ex-check:hover{border-color:var(--cyan)}
.ex-body{min-width:0}
.ex-name{font-size:14px;font-weight:600;margin-bottom:5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ex-meta{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.ex-meta span{font-size:11px;color:var(--dim);white-space:nowrap}
.ex-meta strong{color:var(--text)}
.ex-actions{display:flex;gap:4px;flex-shrink:0}
.ex-btn{width:30px;height:30px;border-radius:8px;background:var(--surface);border:1px solid var(--border);display:grid;place-items:center;font-size:13px;transition:all 0.15s}
.ex-btn:hover{border-color:var(--border2);background:var(--surface2)}
.ex-btn.active{background:var(--cyan);color:var(--deep);border-color:var(--cyan)}
.ex-tip{grid-column:1/-1;margin-top:6px;padding:10px 12px;background:rgba(139,61,217,0.12);border:1px solid rgba(139,61,217,0.25);border-radius:var(--r);font-size:12px;color:var(--dim);line-height:1.5}
.ex-tip strong{color:var(--purple)}
[data-theme=light] .ex-btn.active{background:var(--purple);color:#fff;border-color:var(--purple)}
[data-theme=light] .ex-check.checked{box-shadow:0 4px 12px rgba(139,61,217,0.3)}

/* ===== WEIGHT PILL ===== */
.w-pill-wrap{display:inline-flex;align-items:center;gap:3px}
.w-pill{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;background:rgba(75,242,242,0.1);border:1px solid rgba(75,242,242,0.25);border-radius:20px;font-family:var(--mono);font-size:11px;font-weight:700;color:var(--cyan);cursor:pointer;transition:all 0.15s;white-space:nowrap}
.w-pill:hover{background:rgba(75,242,242,0.18);border-color:rgba(75,242,242,0.5)}
[data-theme=light] .w-pill{color:var(--purple);background:rgba(139,61,217,0.08);border-color:rgba(139,61,217,0.25)}
[data-theme=light] .w-pill:hover{background:rgba(139,61,217,0.14)}
.w-qbump{width:22px;height:22px;border-radius:6px;background:rgba(75,242,242,0.08);border:1px solid rgba(75,242,242,0.2);color:var(--cyan);font-size:13px;font-weight:700;display:grid;place-items:center;line-height:1;transition:all 0.15s;flex-shrink:0}
.w-qbump:hover{background:var(--cyan);color:var(--deep);border-color:var(--cyan);transform:scale(1.1)}
.w-qbump:active{transform:scale(0.95)}
[data-theme=light] .w-qbump{color:var(--purple);background:rgba(139,61,217,0.07);border-color:rgba(139,61,217,0.2)}
[data-theme=light] .w-qbump:hover{background:var(--purple);color:#fff;border-color:var(--purple)}
.w-flash{animation:wflash 0.35s ease}
@keyframes wflash{0%{transform:scale(1)}50%{transform:scale(1.18)}100%{transform:scale(1)}}
.w-trend-up{color:#4BF2F2;font-size:10px}
.w-trend-dn{color:#ff8b8b;font-size:10px}
.w-editor{grid-column:1/-1;margin-top:8px;display:flex;align-items:center;gap:8px;padding:10px 12px;background:var(--surface2);border:1px solid var(--border2);border-radius:var(--r)}
.w-bump{width:28px;height:28px;border-radius:7px;background:var(--surface);border:1px solid var(--border);color:var(--cyan);font-size:16px;font-weight:700;display:grid;place-items:center;transition:all 0.15s}
.w-bump:hover{background:var(--cyan);color:var(--deep)}
.w-input{flex:1;background:transparent;border:none;color:var(--cyan);font-family:var(--mono);font-size:16px;font-weight:700;text-align:center;outline:none;min-width:0}
.w-input::-webkit-inner-spin-button,.w-input::-webkit-outer-spin-button{-webkit-appearance:none}
[data-theme=light] .w-bump{color:var(--purple)}
[data-theme=light] .w-bump:hover{background:var(--purple);color:#fff}
[data-theme=light] .w-input{color:var(--purple)}

/* ===== HISTORY ===== */
.hist-block{grid-column:1/-1;margin-top:8px;padding:14px 14px;background:rgba(58,55,166,0.15);border:1px solid var(--border);border-radius:var(--r);display:flex;flex-direction:column;gap:10px}
.sparkline{width:100%;height:44px}
.spark-meta{display:flex;justify-content:space-between;font-family:var(--mono);font-size:10px;color:var(--faint)}
.spark-delta{font-weight:700;color:var(--cyan)}
.spark-delta.dn{color:#ff8b8b}
.hist-list{display:flex;flex-direction:column;gap:3px;max-height:140px;overflow-y:auto}
.hist-row{display:grid;grid-template-columns:1fr auto auto;gap:10px;align-items:center;padding:5px 0;border-bottom:1px dashed var(--border);font-size:12px}
.hist-row:last-child{border-bottom:none}
.hist-date{color:var(--faint);font-family:var(--mono);font-size:11px}
.hist-kg{font-family:var(--mono);font-weight:700}
.hist-delta{font-family:var(--mono);font-size:11px;font-weight:700;padding:2px 6px;border-radius:5px;min-width:42px;text-align:center}
.hist-delta.up{background:rgba(75,242,242,0.12);color:var(--cyan)}
.hist-delta.dn{background:rgba(255,139,139,0.12);color:#ff8b8b}

/* ===== REST DAY ===== */
.rest-card{display:flex;flex-direction:column;align-items:center;gap:10px;padding:48px 24px;text-align:center}
.rest-emoji{font-size:48px}
.rest-title{font-size:22px;font-weight:700}
.rest-sub{font-size:14px;color:var(--dim);max-width:380px;line-height:1.6}

/* ===== NUTRITION ===== */
.macro-overview{display:flex;align-items:center;gap:24px;padding:24px;flex-wrap:wrap;border-bottom:1px solid var(--border)}
.macro-ring{width:140px;height:140px;flex-shrink:0}
.macro-stats{flex:1;display:flex;flex-direction:column;gap:10px;min-width:160px}
.macro-row{display:flex;justify-content:space-between;align-items:center;gap:12px}
.macro-label{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--dim)}
.macro-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.macro-value{font-size:13px;font-weight:700;font-family:var(--mono)}
.quartiles{display:flex;flex-direction:column;gap:0}
.quartil{padding:16px 20px;border-bottom:1px solid var(--border)}
.quartil:last-child{border-bottom:none}
.quartil-head{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;margin-bottom:10px;flex-wrap:wrap}
.quartil-time{font-family:var(--mono);font-size:10px;color:var(--faint);letter-spacing:0.08em;margin-bottom:2px}
.quartil-label{font-size:13px;font-weight:700}
.quartil-focus{font-size:11px;color:var(--dim);margin-top:1px}
.quartil-cal{font-family:var(--mono);font-size:15px;font-weight:700;color:var(--cyan);white-space:nowrap}
[data-theme=light] .quartil-cal{color:var(--purple)}
.food-list{display:flex;flex-direction:column;gap:4px}
.food-row{display:flex;justify-content:space-between;align-items:center;gap:10px;padding:5px 0;border-bottom:1px dashed var(--border);flex-wrap:wrap}
.food-row:last-child{border-bottom:none}
.food-name{font-size:13px}
.food-qty{font-size:11px;color:var(--faint);font-family:var(--mono)}
.food-macros{display:flex;gap:8px;font-family:var(--mono);font-size:11px;flex-shrink:0}
.food-macros .p{color:var(--cyan)}
[data-theme=light] .food-macros .p{color:var(--purple)}

/* ===== SUPPS ===== */
.supp-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px}
.supp-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:18px 16px;display:flex;flex-direction:column;gap:6px;backdrop-filter:blur(8px);transition:all 0.2s}
.supp-card:hover{border-color:var(--border2);transform:translateY(-2px)}
.supp-icon{font-size:28px}
.supp-name{font-size:14px;font-weight:700}
.supp-dose{font-family:var(--mono);font-size:12px;font-weight:700;color:var(--cyan)}
.supp-time{font-size:11px;color:var(--faint)}
.supp-purpose{font-size:11px;color:var(--dim);line-height:1.5;margin-top:4px;padding-top:4px;border-top:1px dashed var(--border)}
[data-theme=light] .supp-dose{color:var(--purple)}

/* ===== PROGRESS ===== */
.prog-head{display:flex;justify-content:space-between;align-items:flex-end;gap:16px;margin-bottom:22px;padding:22px 22px 18px;border-bottom:1px solid var(--border);flex-wrap:wrap}
.prog-tag{font-size:10px;letter-spacing:0.18em;text-transform:uppercase;color:var(--cyan);font-weight:700;margin-bottom:6px}
[data-theme=light] .prog-tag{color:var(--purple)}
.prog-title{font-size:24px;font-weight:700;letter-spacing:-0.02em}
.prog-mini{display:flex;gap:14px}
.prog-mini-val{font-family:var(--mono);font-size:26px;font-weight:700;color:var(--cyan);line-height:1}
[data-theme=light] .prog-mini-val{color:var(--purple)}
.prog-mini-lbl{font-size:10px;letter-spacing:0.15em;text-transform:uppercase;color:var(--faint);margin-top:2px}
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;padding:0 22px 22px}
.stat-card{background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);padding:16px;position:relative;overflow:hidden}
.stat-card::before{content:"";position:absolute;inset:0;background:radial-gradient(circle at 100% 0%,var(--ac,transparent),transparent 50%);opacity:0.15;pointer-events:none}
.stat-icon{font-size:20px;margin-bottom:8px}
.stat-val{font-family:var(--mono);font-size:28px;font-weight:700;letter-spacing:-0.02em;line-height:1;margin-bottom:5px}
.stat-lbl-row{display:flex;align-items:center;justify-content:space-between;gap:6px;margin-bottom:3px}
.stat-lbl{font-size:12px;font-weight:600;color:var(--dim)}
.stat-info{width:18px;height:18px;border-radius:50%;background:var(--surface);border:1px solid var(--border);font-size:11px;font-weight:700;color:var(--dim);display:grid;place-items:center;cursor:help;transition:all 0.15s;flex-shrink:0;line-height:1}
.stat-info:hover{background:var(--cyan);color:var(--deep);border-color:var(--cyan)}
[data-theme=light] .stat-info:hover{background:var(--purple);color:#fff;border-color:var(--purple)}
.stat-sub{font-size:11px;color:var(--faint);font-family:var(--mono)}
.prog-section{padding:0 22px 22px}
.prog-section-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;flex-wrap:wrap;gap:8px}
.prog-section-head h3{font-size:16px;font-weight:700;letter-spacing:-0.01em}
.heatmap{display:flex;flex-direction:column;gap:6px}
.hm-labels{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;margin-bottom:2px}
.hm-label{font-size:10px;letter-spacing:0.08em;color:var(--faint);text-align:center;font-weight:700}
.hm-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:5px}
.hm-cell{aspect-ratio:1/1;border-radius:7px;background:var(--surface2);border:1px solid var(--border);display:grid;place-items:center;transition:all 0.15s;position:relative}
.hm-cell span{font-family:var(--mono);font-size:10px;font-weight:600;color:var(--faint)}
.hm-cell.out{opacity:0.22}
.hm-cell.today{outline:2px solid var(--cyan);outline-offset:1px}
.hm-cell.h1{background:rgba(139,61,217,0.22);border-color:rgba(139,61,217,0.35)}
.hm-cell.h1 span{color:var(--dim)}
.hm-cell.h2{background:rgba(75,242,242,0.22);border-color:rgba(75,242,242,0.4)}
.hm-cell.h2 span{color:var(--text)}
.hm-cell.h3{background:linear-gradient(135deg,var(--purple),var(--cyan));border-color:var(--cyan);box-shadow:0 0 14px rgba(75,242,242,0.28)}
.hm-cell.h3 span{color:#fff;font-weight:700}
.hm-cell:hover{transform:scale(1.07)}
.hm-legend{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--faint)}
.hm-legend .hm-cell{width:12px;height:12px;aspect-ratio:auto;border-radius:4px}
.pr-list{display:flex;flex-direction:column;gap:7px}
.pr-row{display:grid;grid-template-columns:1fr auto auto;gap:12px;align-items:center;padding:12px 14px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);transition:all 0.15s}
.pr-row:hover{border-color:var(--border2)}
.pr-name{font-size:13px;font-weight:600}
.pr-day{font-size:10px;color:var(--faint);margin-top:2px;letter-spacing:0.05em;text-transform:uppercase}
.pr-prog{display:flex;align-items:center;gap:7px;font-family:var(--mono);font-size:12px}
.pr-from{color:var(--faint)}
.pr-arr{color:var(--dim)}
.pr-to{color:var(--cyan);font-weight:700}
[data-theme=light] .pr-to{color:var(--purple)}
.pr-delta{display:flex;flex-direction:column;align-items:flex-end;font-family:var(--mono);font-size:12px;font-weight:700;color:var(--cyan);padding:5px 9px;background:rgba(75,242,242,0.1);border-radius:8px}
[data-theme=light] .pr-delta{color:var(--purple);background:rgba(139,61,217,0.08)}
.pr-pct{font-size:10px;opacity:0.75}
.empty-st{text-align:center;padding:32px 16px;background:var(--surface2);border:1px dashed var(--border);border-radius:var(--r)}
.empty-st .ei{font-size:32px;margin-bottom:8px}
.empty-st .et{font-size:14px;font-weight:700;margin-bottom:5px}
.empty-st .es{font-size:12px;color:var(--dim);max-width:340px;margin:0 auto;line-height:1.5}
/* VS compare */
.vs-card{margin-bottom:16px}
.vs-title{font-size:17px;font-weight:700;letter-spacing:-0.01em;margin-bottom:16px}
.vs-rows{display:flex;flex-direction:column;gap:12px}
.vs-row{display:flex;flex-direction:column;gap:5px}
.vs-lbl{font-size:11px;letter-spacing:0.1em;text-transform:uppercase;color:var(--dim);font-weight:600}
.vs-bars{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.vs-bar{position:relative;height:26px;background:var(--surface2);border:1px solid var(--border);border-radius:7px;display:flex;align-items:center;overflow:hidden;padding:0 9px}
.vs-fill{position:absolute;top:0;left:0;bottom:0;border-radius:7px;opacity:0.32;transition:width 0.4s cubic-bezier(0.4,0,0.2,1)}
.vs-ang .vs-fill{left:auto;right:0}
.vs-val{font-family:var(--mono);font-size:12px;font-weight:700;position:relative;z-index:1}
.vs-ang{justify-content:flex-end}
.vs-legend{display:flex;gap:14px;margin-top:12px;font-size:11px;color:var(--dim)}
.leg-dot{display:inline-block;width:9px;height:9px;border-radius:50%;margin-right:5px;vertical-align:middle}

/* ===== COMPARE (side by side) ===== */
.compare{display:grid;grid-template-columns:1fr 1fr;gap:16px}
@media(max-width:700px){.compare{grid-template-columns:1fr}}
.cmp-col{display:flex;flex-direction:column;gap:14px}
.cmp-head{display:flex;align-items:center;gap:12px;padding:16px 18px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);backdrop-filter:blur(8px)}
.cmp-av{width:38px;height:38px;border-radius:50%;display:grid;place-items:center;font-size:16px;font-weight:700;color:#fff;background:linear-gradient(135deg,var(--a-color,var(--purple)),var(--a-accent,var(--cyan)))}
.cmp-name{font-size:15px;font-weight:700}
.cmp-goal{font-size:11px;color:var(--faint);margin-top:1px}

/* ===== TIMER FAB ===== */
.timer-fab{position:fixed;right:20px;bottom:24px;z-index:100;display:flex;flex-direction:column;align-items:flex-end;gap:10px}
.timer-panel{background:var(--deep);border:1px solid var(--border2);border-radius:var(--rl);padding:18px;width:210px;box-shadow:0 20px 60px rgba(0,0,0,0.5);backdrop-filter:blur(20px)}
.timer-panel-title{font-size:11px;letter-spacing:0.15em;text-transform:uppercase;color:var(--faint);font-weight:700;margin-bottom:10px}
.timer-display{font-family:var(--mono);font-size:40px;font-weight:700;text-align:center;letter-spacing:-0.02em;margin-bottom:12px;color:var(--cyan);transition:color 0.3s,text-shadow 0.3s}
.timer-display.timer-high{color:var(--cyan)}
.timer-display.timer-mid{color:#FFA500}
.timer-display.timer-low{color:#FF6B6B;animation:timer-pulse 0.5s ease-in-out infinite}
@keyframes timer-pulse{0%,100%{text-shadow:0 0 10px rgba(255,107,107,0.5)}50%{text-shadow:0 0 20px rgba(255,107,107,0.8)}}
[data-theme=light] .timer-display{color:var(--purple)}
[data-theme=light] .timer-display.timer-high{color:var(--purple)}
[data-theme=light] .timer-display.timer-mid{color:var(--indigo)}
.timer-presets{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:12px}
.timer-preset{padding:4px 8px;border-radius:6px;background:var(--surface);border:1px solid var(--border);font-size:11px;font-weight:600;font-family:var(--mono);transition:all 0.15s}
.timer-preset:hover{border-color:var(--cyan);color:var(--cyan)}
[data-theme=light] .timer-preset:hover{border-color:var(--purple);color:var(--purple)}
.timer-ctrls{display:flex;gap:8px}
.timer-start{flex:1;padding:10px;border-radius:var(--r);background:linear-gradient(135deg,var(--purple),var(--indigo));color:#fff;font-size:13px;font-weight:700;transition:all 0.2s}
.timer-start:hover{filter:brightness(1.1)}
.timer-reset{padding:10px 14px;border-radius:var(--r);background:var(--surface);border:1px solid var(--border);font-size:13px;font-weight:600;color:var(--dim);transition:all 0.2s}
.timer-reset:hover{border-color:var(--border2);color:var(--text)}
.timer-bubble{width:52px;height:52px;border-radius:50%;background:linear-gradient(135deg,var(--purple),var(--indigo));color:#fff;font-size:18px;font-weight:700;display:grid;place-items:center;box-shadow:0 8px 24px rgba(139,61,217,0.4),inset 0 1px 0 rgba(255,255,255,0.2);transition:all 0.2s;font-family:var(--mono);letter-spacing:-0.03em}
.timer-bubble.running{animation:ring 1s ease-in-out infinite;background:linear-gradient(135deg,var(--cyan),var(--indigo))}
.timer-bubble:hover{transform:scale(1.08)}
@keyframes ring{0%,100%{box-shadow:0 8px 24px rgba(75,242,242,0.3)}50%{box-shadow:0 8px 32px rgba(75,242,242,0.6)}}

/* ===== LOADING / TOAST ===== */
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:50vh;gap:16px;color:var(--faint)}
.spinner{width:40px;height:40px;border:2px solid var(--border);border-top-color:var(--cyan);border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:var(--deep);border:1px solid var(--border2);border-radius:22px;padding:10px 20px;font-size:13px;font-weight:600;display:flex;align-items:center;gap:8px;z-index:200;box-shadow:0 10px 40px rgba(0,0,0,0.4);animation:slideUp 0.3s ease;white-space:nowrap}
@keyframes slideUp{from{opacity:0;transform:translateX(-50%) translateY(10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}

/* ===== LIGHT MODE COMPREHENSIVE FIXES ===== */
[data-theme=light] .ex-check:hover{border-color:var(--purple)}
[data-theme=light] .day-pill.done .day-num{color:var(--purple)}
[data-theme=light] .day-pill.done{border-color:rgba(58,55,166,0.3)}
[data-theme=light] .spark-delta{color:var(--purple)}
[data-theme=light] .spark-delta.dn{color:#c0392b}
[data-theme=light] .hist-delta.up{background:rgba(58,55,166,0.09);color:var(--purple)}
[data-theme=light] .hist-delta.dn{background:rgba(192,57,43,0.09);color:#c0392b}
[data-theme=light] .w-trend-up{color:var(--indigo)}
[data-theme=light] .w-trend-dn{color:#c0392b}
[data-theme=light] .timer-bubble{box-shadow:0 8px 24px rgba(58,55,166,0.3)}
[data-theme=light] .timer-bubble.running{background:linear-gradient(135deg,var(--indigo),var(--purple))}
[data-theme=light] .brand-name{background:linear-gradient(90deg,var(--purple),var(--indigo));-webkit-background-clip:text;background-clip:text}
[data-theme=light] .sync-badge.online .sync-dot{background:var(--indigo);box-shadow:0 0 6px rgba(58,55,166,0.5)}
[data-theme=light] .spinner{border-top-color:var(--purple)}
[data-theme=light] .ex-tip{background:rgba(58,55,166,0.07);border-color:rgba(58,55,166,0.18)}
[data-theme=light] .ex-tip strong{color:var(--purple)}
[data-theme=light] .modal{background:#ffffff;box-shadow:0 30px 80px rgba(58,55,166,0.15)}
[data-theme=light] .modal-note{background:rgba(58,55,166,0.05);border-color:rgba(58,55,166,0.14)}
[data-theme=light] .modal-note strong{color:var(--purple)}
[data-theme=light] .step-num{background:var(--purple)}
[data-theme=light] .step-num a{color:var(--indigo)}
[data-theme=light] .hm-cell.today{outline-color:var(--purple)}
[data-theme=light] .hm-cell.h2{background:rgba(58,55,166,0.15);border-color:rgba(58,55,166,0.3)}
[data-theme=light] .hm-cell.h2 span{color:var(--text)}
[data-theme=light] .hm-cell.h3{background:linear-gradient(135deg,var(--purple),var(--indigo));border-color:var(--purple)}
[data-theme=light] .timer-preset:hover{border-color:var(--purple);color:var(--purple)}
[data-theme=light] .macro-ring circle:nth-child(2){stroke:var(--purple)}
[data-theme=light] .macro-ring text:nth-child(5){fill:var(--indigo)}
[data-theme=light] .stat-chip{background:rgba(58,55,166,0.08);border-color:rgba(58,55,166,0.15);color:var(--dim)}
[data-theme=light] .day-pill.active{background:linear-gradient(135deg,rgba(58,55,166,0.18),rgba(80,72,200,0.18));border-color:rgba(58,55,166,0.4)}
[data-theme=light] .athlete-tab.active{box-shadow:0 8px 28px rgba(58,55,166,0.2),inset 0 1px 0 rgba(255,255,255,0.3)}
[data-theme=light] .vs-fill{opacity:0.45}
[data-theme=light] .pr-delta{border:1px solid rgba(58,55,166,0.15)}

/* ===== SKIPPED EXERCISE ===== */
.ex.skipped{opacity:0.45;background:rgba(255,80,80,0.05);border-color:rgba(255,80,80,0.18)!important}
.ex.skipped .ex-name{text-decoration:line-through;color:var(--faint)}
.ex-skip{width:30px;height:30px;border-radius:8px;background:rgba(255,80,80,0.1);border:1px solid rgba(255,80,80,0.25);display:grid;place-items:center;font-size:13px;transition:all 0.15s;flex-shrink:0}
.ex-skip.active{background:rgba(255,80,80,0.25);border-color:rgba(255,80,80,0.5)}
.ex-skip:hover{background:rgba(255,80,80,0.2);border-color:rgba(255,80,80,0.4)}
.skip-badge{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;background:rgba(255,80,80,0.12);border:1px solid rgba(255,80,80,0.25);border-radius:20px;font-size:10px;font-weight:700;color:#ff8b8b;margin-left:4px}
.skip-reason-panel{grid-column:1/-1;margin-top:6px;display:flex;flex-wrap:wrap;gap:6px;padding:10px 12px;background:rgba(255,80,80,0.06);border:1px solid rgba(255,80,80,0.18);border-radius:var(--r)}
.skip-reason-btn{padding:5px 11px;border-radius:20px;background:var(--surface2);border:1px solid var(--border);font-size:11px;font-weight:600;color:var(--dim);transition:all 0.15s}
.skip-reason-btn:hover{border-color:rgba(255,80,80,0.4);color:#ff8b8b}
.skip-reason-btn.sel{background:rgba(255,80,80,0.15);border-color:rgba(255,80,80,0.45);color:#ff8b8b}
.skip-summary{padding:14px 20px;background:rgba(255,80,80,0.06);border-top:1px solid rgba(255,80,80,0.12);display:flex;align-items:center;gap:10px;font-size:12px;color:var(--dim)}
.skip-summary-icon{font-size:18px}
[data-theme=light] .ex.skipped{background:rgba(200,30,30,0.04);border-color:rgba(200,30,30,0.15)!important}
[data-theme=light] .skip-badge{background:rgba(200,30,30,0.08);border-color:rgba(200,30,30,0.2);color:#c0392b}
[data-theme=light] .skip-reason-btn:hover,[data-theme=light] .skip-reason-btn.sel{color:#c0392b;border-color:rgba(200,30,30,0.4)}
[data-theme=light] .skip-summary{background:rgba(200,30,30,0.04);border-color:rgba(200,30,30,0.1)}
@media(max-width:640px){.ex-skip{width:26px;height:26px;font-size:11px}}

/* ===== FIREBASE INLINE CONFIG (no modal) ===== */
.fb-inline{display:flex;flex-direction:column;gap:8px;padding:16px;background:var(--surface);border:1px solid var(--border2);border-radius:var(--rl);margin-bottom:18px;backdrop-filter:blur(12px)}
.fb-inline-head{display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap}
.fb-inline-title{font-size:13px;font-weight:700;display:flex;align-items:center;gap:8px}
.fb-inline-fields{display:grid;grid-template-columns:1fr 1fr;gap:8px}
@media(max-width:560px){.fb-inline-fields{grid-template-columns:1fr}}
.fb-field{display:flex;flex-direction:column;gap:4px}
.fb-field label{font-size:10px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:var(--faint)}
.fb-field input{background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);padding:9px 12px;color:var(--text);font-size:12px;outline:none;transition:border-color 0.2s;font-family:var(--mono)}
.fb-field input:focus{border-color:var(--border2)}
.fb-field input::placeholder{color:var(--faint);font-size:11px}
.fb-field.full{grid-column:1/-1}
.fb-connect{padding:10px 20px;border-radius:var(--r);background:linear-gradient(135deg,var(--purple),var(--indigo));color:#fff;font-weight:700;font-size:13px;transition:all 0.2s;white-space:nowrap;align-self:flex-end}
.fb-connect:hover{filter:brightness(1.1)}
.fb-actions{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.fb-skip{font-size:12px;color:var(--faint);text-decoration:underline;cursor:pointer;background:none;border:none;transition:color 0.15s}
.fb-skip:hover{color:var(--dim)}

/* ===== DAY PROGRESS BAR ===== */
.day-progress{padding:14px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:14px;background:var(--surface2)}
.day-progress-info{flex:1;min-width:0}
.day-progress-label{font-size:11px;letter-spacing:0.1em;text-transform:uppercase;color:var(--faint);font-weight:700;margin-bottom:6px}
.day-progress-track{height:8px;background:var(--surface);border-radius:5px;overflow:hidden;border:1px solid var(--border);position:relative}
.day-progress-fill{height:100%;background:linear-gradient(90deg,var(--purple),var(--cyan));border-radius:5px;transition:width 0.5s cubic-bezier(0.4,0,0.2,1);position:relative;box-shadow:0 0 12px rgba(75,242,242,0.4)}
[data-theme=light] .day-progress-fill{box-shadow:0 0 12px rgba(58,55,166,0.3)}
.day-progress-num{font-family:var(--mono);font-size:18px;font-weight:700;color:var(--text);white-space:nowrap;line-height:1}
.day-progress-pct{font-family:var(--mono);font-size:11px;color:var(--cyan);font-weight:700;margin-top:3px}
[data-theme=light] .day-progress-pct{color:var(--purple)}
@media(max-width:640px){
  .day-progress{padding:11px 14px;gap:10px}
  .day-progress-num{font-size:15px}
  .day-progress-label{font-size:10px;margin-bottom:4px}
}

/* ===== AUTO-TIMER (after check) ===== */
.auto-timer{position:fixed;top:14px;left:50%;transform:translateX(-50%);background:var(--deep);border:1px solid var(--border2);border-radius:30px;padding:9px 18px 9px 14px;display:flex;align-items:center;gap:10px;z-index:300;box-shadow:0 12px 40px rgba(0,0,0,0.5);backdrop-filter:blur(20px);animation:slideDown 0.35s cubic-bezier(0.4,0,0.2,1)}
@keyframes slideDown{from{opacity:0;transform:translate(-50%,-30px)}to{opacity:1;transform:translate(-50%,0)}}
.auto-timer-circle{width:36px;height:36px;position:relative;flex-shrink:0}
.auto-timer-circle svg{transform:rotate(-90deg);width:36px;height:36px}
.auto-timer-circle circle{fill:none;stroke-width:3;cx:18;cy:18;r:15}
.auto-timer-circle .at-bg{stroke:var(--surface)}
.auto-timer-circle .at-fg{stroke:var(--cyan);stroke-linecap:round;transition:stroke-dashoffset 1s linear}
[data-theme=light] .auto-timer-circle .at-fg{stroke:var(--purple)}
.auto-timer-num{position:absolute;inset:0;display:grid;place-items:center;font-family:var(--mono);font-size:11px;font-weight:700;color:var(--cyan)}
[data-theme=light] .auto-timer-num{color:var(--purple)}
.auto-timer-info{display:flex;flex-direction:column;gap:1px;min-width:0;max-width:200px}
.auto-timer-label{font-size:10px;letter-spacing:0.1em;text-transform:uppercase;color:var(--faint);font-weight:700}
.auto-timer-name{font-size:13px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.auto-timer-close{width:26px;height:26px;border-radius:50%;background:var(--surface);border:1px solid var(--border);font-size:12px;display:grid;place-items:center;flex-shrink:0;color:var(--dim);transition:all 0.15s}
.auto-timer-close:hover{color:var(--text);border-color:var(--border2)}
.auto-timer.done{animation:pulse 0.5s ease 3}
.auto-timer.done .at-fg{stroke:#4BF2F2;animation:flashStroke 0.4s ease infinite}
@keyframes flashStroke{0%,100%{opacity:1}50%{opacity:0.3}}

/* ===== EXERCISE NOTES ===== */
.ex-note-btn{position:relative}
.ex-note-btn.has-note::after{content:"";position:absolute;top:3px;right:3px;width:6px;height:6px;border-radius:50%;background:var(--cyan);box-shadow:0 0 4px rgba(75,242,242,0.7)}
[data-theme=light] .ex-note-btn.has-note::after{background:var(--purple)}
.ex-note-panel{grid-column:1/-1;margin-top:6px;padding:10px 12px;background:rgba(75,242,242,0.06);border:1px solid rgba(75,242,242,0.2);border-radius:var(--r);display:flex;flex-direction:column;gap:8px}
[data-theme=light] .ex-note-panel{background:rgba(58,55,166,0.05);border-color:rgba(58,55,166,0.15)}
.ex-note-panel textarea{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:8px 10px;color:var(--text);font-size:12px;font-family:inherit;resize:vertical;min-height:60px;outline:none;line-height:1.5}
.ex-note-panel textarea:focus{border-color:var(--border2)}
.ex-note-actions{display:flex;gap:6px;align-items:center;justify-content:flex-end}
.ex-note-save{padding:6px 14px;border-radius:6px;background:linear-gradient(135deg,var(--purple),var(--indigo));color:#fff;font-size:11px;font-weight:700;border:none}
.ex-note-clear{padding:6px 12px;border-radius:6px;background:var(--surface);border:1px solid var(--border);color:var(--dim);font-size:11px;font-weight:600}
.ex-note-display{font-size:12px;color:var(--dim);line-height:1.5;padding:8px 10px;background:var(--surface2);border-radius:8px;border-left:3px solid var(--cyan);white-space:pre-wrap}
[data-theme=light] .ex-note-display{border-left-color:var(--purple)}

/* ===== BODY WEIGHT TRACKER ===== */
.bw-card{margin-bottom:16px}
.bw-head{padding:18px 20px 14px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:flex-end;gap:14px;flex-wrap:wrap}
.bw-title{font-size:16px;font-weight:700;letter-spacing:-0.01em;display:flex;align-items:center;gap:8px}
.bw-meta{display:flex;gap:14px;align-items:center}
.bw-curr{display:flex;flex-direction:column;align-items:flex-end}
.bw-curr-val{font-family:var(--mono);font-size:24px;font-weight:700;color:var(--cyan);line-height:1}
[data-theme=light] .bw-curr-val{color:var(--purple)}
.bw-curr-lbl{font-size:9px;letter-spacing:0.15em;text-transform:uppercase;color:var(--faint);margin-top:3px;font-weight:700}
.bw-target{display:flex;flex-direction:column;align-items:flex-end;padding-left:14px;border-left:1px solid var(--border)}
.bw-target-val{font-family:var(--mono);font-size:20px;font-weight:700;color:var(--text);line-height:1;opacity:0.85}
.bw-target-lbl{font-size:9px;letter-spacing:0.15em;text-transform:uppercase;color:var(--faint);margin-top:3px;font-weight:700}
.bw-bar-wrap{padding:14px 20px}
.bw-bar-track{height:14px;background:var(--surface2);border-radius:8px;overflow:hidden;border:1px solid var(--border);position:relative}
.bw-bar-fill{height:100%;border-radius:8px;background:linear-gradient(90deg,var(--purple),var(--cyan));transition:width 0.6s cubic-bezier(0.4,0,0.2,1);position:relative}
.bw-bar-marker{position:absolute;top:-3px;width:2px;height:20px;background:var(--text);opacity:0.4}
.bw-bar-meta{display:flex;justify-content:space-between;margin-top:6px;font-family:var(--mono);font-size:10px;color:var(--faint)}
.bw-input-row{display:flex;align-items:center;gap:8px;padding:0 20px 16px;flex-wrap:wrap}
.bw-input-label{font-size:11px;color:var(--dim);font-weight:600;flex:1;min-width:0}
.bw-input{background:var(--surface);border:1.5px solid var(--border);border-radius:8px;padding:9px 12px;color:var(--cyan);font-family:var(--mono);font-size:15px;font-weight:700;outline:none;width:90px;text-align:center}
[data-theme=light] .bw-input{color:var(--purple)}
.bw-input:focus{border-color:var(--border2)}
.bw-input::-webkit-inner-spin-button,.bw-input::-webkit-outer-spin-button{-webkit-appearance:none}
.bw-bump-btn{width:30px;height:30px;border-radius:8px;background:var(--surface);border:1px solid var(--border);color:var(--cyan);font-size:16px;font-weight:700;display:grid;place-items:center;transition:all 0.15s;flex-shrink:0}
.bw-bump-btn:hover{background:var(--cyan);color:var(--deep);border-color:var(--cyan);transform:scale(1.08)}
.bw-bump-btn:active{transform:scale(0.95)}
[data-theme=light] .bw-bump-btn{color:var(--purple)}
[data-theme=light] .bw-bump-btn:hover{background:var(--purple);color:#fff;border-color:var(--purple)}
.bw-input.bw-saving{border-color:var(--cyan);box-shadow:0 0 0 3px rgba(75,242,242,0.18)}
[data-theme=light] .bw-input.bw-saving{border-color:var(--purple);box-shadow:0 0 0 3px rgba(58,55,166,0.18)}
.bw-save{padding:9px 18px;border-radius:8px;background:linear-gradient(135deg,var(--purple),var(--indigo));color:#fff;font-size:13px;font-weight:700;border:none;transition:all 0.2s;min-width:84px}
.bw-save:hover{filter:brightness(1.1)}
.bw-chart{padding:0 20px 20px}
.bw-chart svg{width:100%;height:120px;display:block}
.bw-chart-meta{display:flex;justify-content:space-between;margin-top:8px;font-family:var(--mono);font-size:10px;color:var(--faint)}
.bw-delta-pos{color:var(--cyan);font-weight:700}
[data-theme=light] .bw-delta-pos{color:var(--purple)}
.bw-empty{padding:30px 20px;text-align:center;color:var(--faint);font-size:12px}

/* ===== ADVANCED STATS ===== */
.advanced-stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:24px;margin-bottom:20px}
.stats-col{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:20px}
.stats-col h3{margin:0 0 16px;font-size:16px;font-weight:700;color:var(--text);display:flex;align-items:center;gap:8px}
.stats-cards{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:20px}
.stat-card{background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:16px;display:flex;flex-direction:column;align-items:center;gap:6px;text-align:center}
.stat-val{font-size:24px;font-weight:700;color:var(--cyan);font-family:var(--mono);line-height:1}
[data-theme=light] .stat-val{color:var(--purple)}
.stat-lbl{font-size:11px;color:var(--faint);font-weight:600;text-transform:uppercase;letter-spacing:0.05em}
.mini-chart{background:var(--surface2);border-radius:12px;padding:14px;border:1px solid var(--border)}
.chart-title{font-size:12px;font-weight:700;color:var(--text);margin-bottom:12px;letter-spacing:-0.01em}
.bar-chart{display:flex;gap:4px;align-items:flex-end;height:100px;width:100%}
.bar-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;position:relative;min-width:0}
.bar{width:100%;background:var(--purple);border-radius:6px 6px 0 0;min-height:4px;transition:background 0.2s}
.bar-label{font-size:8px;color:var(--faint);font-weight:600;text-transform:uppercase}

/* ===== PROGRESS PHOTOS ===== */
.progress-photos-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:20px;margin-bottom:20px}
.progress-photos-card h3{margin:0 0 16px;font-size:16px;font-weight:700;color:var(--text)}
.photo-upload{margin-bottom:16px}
.upload-btn{display:inline-block;padding:12px 18px;background:linear-gradient(135deg,var(--purple),var(--indigo));color:#fff;border-radius:12px;font-size:13px;font-weight:700;cursor:pointer;transition:all 0.2s;border:none}
.upload-btn:hover{filter:brightness(1.1);transform:translateY(-2px)}
.photo-nav{margin-bottom:16px}
.month-select{width:100%;padding:10px 12px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:13px;font-weight:600}
.photo-gallery{display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:10px;margin-bottom:20px}
.photo-thumb{aspect-ratio:1;border-radius:12px;overflow:hidden;border:2px solid var(--border);cursor:pointer;transition:all 0.2s}
.photo-thumb:hover{border-color:var(--cyan);box-shadow:0 0 12px rgba(75,242,242,0.15)}
.photo-thumb img{width:100%;height:100%;object-fit:cover}
.before-after-slider{margin-top:20px;padding-top:20px;border-top:1px solid var(--border)}
.slider-container{position:relative;width:100%;aspect-ratio:1;border-radius:12px;overflow:hidden;background:var(--surface2);margin-bottom:12px}
.slider-img{width:100%;height:100%;object-fit:cover;position:absolute;top:0;left:0}
.slider-img-overlay{position:absolute;top:0;left:0;height:100%;object-fit:cover;border-right:3px solid var(--cyan)}
.slider-divider{position:absolute;top:0;height:100%;width:3px;background:var(--cyan);cursor:ew-resize;left:50%;transform:translateX(-50%);z-index:10}
.slider-labels{display:flex;justify-content:space-between;padding:0 12px;font-size:12px;font-weight:600;color:var(--dim)}
.photo-empty{padding:30px 20px;text-align:center;color:var(--faint);font-size:12px}

/* ===== BACKUP MENU ===== */
.backup-menu-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.6);backdrop-filter:blur(6px);display:grid;place-items:center;z-index:1000;padding:14px;animation:fadeIn 0.25s ease}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.backup-menu{background:var(--deep);border:1px solid var(--border2);border-radius:var(--rl);padding:24px 22px;max-width:380px;width:100%;box-shadow:0 30px 80px rgba(0,0,0,0.6)}
.backup-menu h3{font-size:18px;font-weight:700;margin-bottom:16px;display:flex;align-items:center;gap:8px}
.backup-actions{display:flex;flex-direction:column;gap:8px}
.backup-btn{padding:13px 14px;border-radius:var(--r);background:var(--surface);border:1px solid var(--border);display:flex;align-items:center;gap:12px;text-align:left;transition:all 0.15s;cursor:pointer}
.backup-btn:hover{border-color:var(--border2);background:var(--surface2)}
.backup-btn-icon{font-size:22px;flex-shrink:0;width:34px;height:34px;display:grid;place-items:center;background:var(--surface2);border-radius:9px}
.backup-btn-text{flex:1}
.backup-btn-title{font-size:13px;font-weight:700;margin-bottom:2px}
.backup-btn-sub{font-size:11px;color:var(--dim)}
.backup-btn.danger{border-color:rgba(255,80,80,0.25)}
.backup-btn.danger:hover{background:rgba(255,80,80,0.08);border-color:rgba(255,80,80,0.4)}
.backup-btn.danger .backup-btn-icon{background:rgba(255,80,80,0.1)}
.backup-close{margin-top:14px;padding:10px;border-radius:var(--r);background:var(--surface2);color:var(--dim);font-size:13px;font-weight:600;width:100%;border:1px solid var(--border);transition:all 0.2s}
.backup-close:hover{color:var(--text);border-color:var(--border2)}

/* ===== GOAL BANNER ===== */
.goal-banner{display:flex;align-items:center;gap:10px;padding:11px 16px;background:linear-gradient(135deg,rgba(139,61,217,0.10),rgba(75,242,242,0.06));border:1px solid rgba(139,61,217,0.22);border-radius:var(--r);margin-bottom:16px;font-size:12px;color:var(--dim);line-height:1.4}
.goal-banner .gb-icon{font-size:20px;flex-shrink:0}
.goal-banner .gb-text strong{display:block;color:var(--text);font-size:13px;font-weight:700;margin-bottom:1px}
[data-theme=light] .goal-banner{background:linear-gradient(135deg,rgba(58,55,166,0.07),rgba(80,72,200,0.04));border-color:rgba(58,55,166,0.18)}

/* ===== CHAT ===== */
.chat-container{display:flex;flex-direction:column;height:calc(100vh - 400px);max-height:600px;background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);overflow:hidden}
.chat-messages{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:10px;scrollbar-width:thin;scrollbar-color:var(--border) transparent}
.chat-messages::-webkit-scrollbar{width:6px}
.chat-messages::-webkit-scrollbar-track{background:transparent}
.chat-messages::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
.chat-msg{display:flex;gap:8px;align-items:flex-end;animation:slideIn 0.3s ease}
@keyframes slideIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.chat-msg.from-sofia .chat-bubble{background:linear-gradient(135deg,rgba(139,61,217,0.25),rgba(75,242,242,0.12));border-color:rgba(139,61,217,0.35);color:var(--text)}
.chat-msg.from-angel .chat-bubble{background:linear-gradient(135deg,rgba(75,242,242,0.25),rgba(139,61,217,0.12));border-color:rgba(75,242,242,0.35);color:var(--text)}
.chat-bubble{padding:10px 14px;border-radius:16px;border:1px solid var(--border);font-size:13px;max-width:280px;word-wrap:break-word;line-height:1.4}
.chat-time{font-size:10px;color:var(--faint);margin-top:2px}
.chat-input-area{padding:14px;border-top:1px solid var(--border);display:flex;gap:8px;background:var(--surface2)}
.chat-input{flex:1;background:var(--deep);border:1px solid var(--border);border-radius:20px;padding:10px 14px;color:var(--text);font-size:13px;outline:none;transition:border-color 0.2s}
.chat-input:focus{border-color:var(--border2)}
.chat-input::placeholder{color:var(--faint)}
.chat-emoji-bar{display:flex;gap:4px;padding:0 14px 10px;flex-wrap:wrap}
.chat-emoji-btn{width:36px;height:36px;border-radius:10px;background:var(--surface);border:1px solid var(--border);display:grid;place-items:center;font-size:18px;transition:all 0.15s;cursor:pointer}
.chat-emoji-btn:hover{background:var(--surface2);border-color:var(--border2);transform:scale(1.05)}
.chat-send{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--purple),var(--indigo));color:#fff;border:none;font-size:14px;display:grid;place-items:center;transition:all 0.2s;flex-shrink:0}
.chat-send:hover{filter:brightness(1.1)}
.chat-send:disabled{opacity:0.5;cursor:not-allowed}
.chat-empty{text-align:center;padding:40px 20px;color:var(--faint);font-size:14px}

/* ===== HYDRATION ===== */
.hydration-card{display:flex;flex-direction:column;gap:16px;padding:24px;background:linear-gradient(135deg,rgba(139,61,217,0.08),rgba(75,242,242,0.08));border:1px solid var(--border);border-radius:var(--rl)}
.hydration-header{display:flex;justify-content:space-between;align-items:center}
.hydration-title{font-size:16px;font-weight:700}
.hydration-goal{font-size:13px;color:var(--faint);margin-top:2px}

.hydration-goal-text{color:var(--faint)}

.hydration-cup.filled::before{opacity:0.3}
.hydration-cup:hover{border-color:var(--border2);transform:scale(1.05)}
.hydration-cup-number{position:relative;z-index:1;font-weight:700}
.hydration-cup.filled .hydration-cup-number{color:var(--cyan);font-size:28px}

/* ===== TRAINING DIARY ===== */
.diary-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:20px;margin-bottom:16px}
.diary-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;padding-bottom:12px;border-bottom:1px solid var(--border)}
.diary-date{font-size:11px;letter-spacing:0.1em;text-transform:uppercase;color:var(--faint);font-weight:600}
.diary-title{font-size:16px;font-weight:700;margin:4px 0 0 0}
.diary-textarea{width:100%;background:var(--deep);border:1px solid var(--border);border-radius:var(--r);padding:12px 14px;color:var(--text);font-size:13px;font-family:inherit;resize:vertical;min-height:120px;outline:none;line-height:1.5;transition:border-color 0.2s}
.diary-textarea:focus{border-color:var(--border2)}
.diary-textarea::placeholder{color:var(--faint)}
.diary-actions{display:flex;gap:8px;margin-top:12px;justify-content:flex-end}
.diary-save{padding:10px 20px;border-radius:var(--r);background:linear-gradient(135deg,var(--purple),var(--indigo));color:#fff;font-size:13px;font-weight:700;border:none;cursor:pointer;transition:all 0.2s}
.diary-save:hover{filter:brightness(1.1)}
.diary-cancel{padding:10px 20px;border-radius:var(--r);background:var(--surface2);border:1px solid var(--border);color:var(--dim);font-size:13px;font-weight:600;cursor:pointer;transition:all 0.2s}
.diary-cancel:hover{border-color:var(--border2);color:var(--text)}
.diary-display{background:var(--deep);border:1px solid var(--border);border-radius:var(--r);padding:14px;font-size:13px;color:var(--text);line-height:1.6;white-space:pre-wrap;word-wrap:break-word}
.diary-empty{text-align:center;padding:40px 20px;color:var(--faint);font-size:13px}

/* ===== WEIGHT PROGRESSION ===== */

.progression-name{font-size:14px;font-weight:700;color:var(--text)}
.progression-day{font-size:11px;color:var(--faint);margin-top:2px}
.progression-badge{display:inline-flex;align-items:center;gap:6px;padding:6px 12px;background:rgba(75,242,242,0.2);border:1px solid rgba(75,242,242,0.4);border-radius:16px;font-size:11px;font-weight:700;color:var(--cyan)}

.progression-arrow{font-size:16px;color:var(--cyan)}
.progression-suggested{font-family:var(--mono);font-size:18px;font-weight:700;color:var(--cyan)}
.progression-actions{display:flex;gap:8px}
.progression-accept{padding:8px 16px;border-radius:var(--r);background:linear-gradient(135deg,var(--cyan),var(--purple));color:#fff;font-size:12px;font-weight:700;border:none;cursor:pointer;transition:all 0.2s}

.progression-skip{padding:8px 16px;border-radius:var(--r);background:var(--surface2);border:1px solid var(--border);color:var(--dim);font-size:12px;font-weight:600;cursor:pointer;transition:all 0.2s}
.progression-skip:hover{border-color:var(--border2);color:var(--text)}
.progression-empty{text-align:center;padding:40px 20px;background:var(--surface);border-radius:var(--r);color:var(--faint);font-size:13px}

.duo-perfect-subtitle{font-size:12px;color:var(--dim)}

.supp-check-card.checked .supp-check-badge{background:var(--cyan);border-color:var(--cyan);color:#fff}

.achievements-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px}

.achievement-card::before{content:'';position:absolute;inset:0;background:radial-gradient(circle at 100% 0%,rgba(75,242,242,0.3),transparent 50%);opacity:0;transition:opacity 0.2s}
.achievement-card.unlocked::before{opacity:1}
.achievement-icon{font-size:40px;margin-bottom:8px}
.achievement-name{font-size:13px;font-weight:700;color:var(--text);margin-bottom:4px}
.achievement-desc{font-size:10px;color:var(--faint);line-height:1.4}
.achievement-card.locked{opacity:0.5}
.achievement-card.locked .achievement-icon{filter:grayscale(100%)}

/* ===== CELEBRATION CONFETTI ===== */
@keyframes confetti-fall{0%{transform:translateY(-10px) rotateZ(0deg);opacity:1}100%{transform:translateY(100vh) rotateZ(360deg);opacity:0}}

@keyframes bounce{0%{transform:scale(0.3);opacity:0}50%{opacity:1}100%{transform:scale(1);opacity:0}}

/* ─── WEIGHT PROGRESSION DETECTOR ─── */
function getProgressionCandidates(state, athId) {
  const today = new Date();
  const candidates = [];
  const routine = ROUTINES[athId];

  routine.forEach(day => {
    if (day.rest) return;
    day.exercises.forEach((ex, i) => {
      const key = `${athId}_${day.day}_${i}`;
      const doneEx = state.doneEx || {};

      // Check last 14 days
      let consecutive = 0;
      for (let d = 0; d < 14; d++) {
        const date = new Date(today);
        date.setDate(date.getDate() - d);
        const dateStr = `${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,'0')}-${String(date.getDate()).padStart(2,'0')}`;
        const testKey = `${key}_${dateStr}`;
        // Check if exercise was completed on this day
        if (doneEx[key]) consecutive++;
        else if (d < 14) break;
      }

      if (consecutive >= 14) {
        const current = (state.weights?.[key]?.current) || parseWeight(ex.weight) || 0;
        candidates.push({
          key, name: ex.name, day: day.day, current, suggested: parseFloat((current + 2.5).toFixed(1))
        });
      }
    });
  });

  return candidates;
}

  }, []);
  function connectFirebase() {

      if (remote) {
        isRemoteUpdateRef.current = true;
        setState(s => {
          const merged = {
            ...s,
            doneEx: {...(remote.doneEx||{}), ...s.doneEx},
            skippedEx: {...(remote.skippedEx||{}), ...(s.skippedEx||{})},
            notes: {...(remote.notes||{}), ...(s.notes||{})},
            bodyWeight: mergeBodyWeight(remote.bodyWeight||{}, s.bodyWeight||{}),
            weights: mergeWeights(remote.weights || {}, s.weights || {}),
            sessionLog: mergeLog(remote.sessionLog || {}, s.sessionLog || {}),
            chatMessages: remote.chatMessages || s.chatMessages,
            hydration: {...(remote.hydration || {}), ...(s.hydration || {})},
            trainingDiary: {...(remote.trainingDiary || {}), ...(s.trainingDiary || {})},
            cardioSessions: {...(remote.cardioSessions || {}), ...(s.cardioSessions || {})},
            supplementStatus: {...(remote.supplementStatus || {}), ...(s.supplementStatus || {})}
          };
          saveLocal(merged);
          return merged;
        });
      }
      setSyncStatus('online');
    });
    // Listen to chat separately
    fbOn('duo_chat', remote => {
      if (remote) {
        setState(s => ({...s, chatMessages: remote}));
      }
    });
    return off;
  }
  function mergeWeights(remote, local) {
    const out = {
      ...remote
    };
    Object.keys(local).forEach(k => {
      if (!remote[k]) out[k] = local[k];else {
        const rh = remote[k].history || [];
        const lh = local[k].history || [];
        const merged = [...rh];
        lh.forEach(e => {
          if (!merged.find(r => r.date === e.date)) merged.push(e);
        });
        merged.sort((a, b) => a.date.localeCompare(b.date));
        out[k] = {
          current: merged.length ? merged[merged.length - 1].weight : null,
          history: merged
        };
      }
    });
    return out;
  }
  function mergeLog(remote, local) {
    const out = {
      ...remote
    };
    Object.keys(local).forEach(athId => {
      if (!out[athId]) out[athId] = local[athId];else out[athId] = {
        ...local[athId],
        ...remote[athId]
      };
    });
    return out;
  }
  function mergeBodyWeight(remote, local) {
    const out = {...remote};
    Object.keys(local).forEach(athId => {
      if (!out[athId]) { out[athId] = local[athId]; }
      else {
        const merged = [...(out[athId]||[])];
        (local[athId]||[]).forEach(e => {
          if (!merged.find(r => r.date === e.date)) merged.push(e);
        });
        merged.sort((a,b) => a.date.localeCompare(b.date));
        out[athId] = merged;
      }
    });
    return out;
  }
